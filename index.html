<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRG Global — Tronox Major Shutdown Workforce Dashboard</title>
  <link rel="icon" href="./srg_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.1.16/Recharts.js"></script>

  <script>
    window.addEventListener("error", function (e) {
      var root = document.getElementById("root");
      if (!root) return;
      root.innerHTML =
        '<div style="padding:40px;font-family:monospace;background:#FEE;color:#900;border:2px solid #C00;margin:20px;border-radius:8px;">' +
        "<h2>Script Error</h2>" +
        "<p><strong>Message:</strong> " + (e.message || "Unknown") + "</p>" +
        "<p><strong>Source:</strong> " + (e.filename || "inline") + "</p>" +
        "<p><strong>Line:</strong> " + (e.lineno || "?") + "</p>" +
        "<p>Loaded: React=" + typeof React +
        ", ReactDOM=" + typeof ReactDOM +
        ", Recharts=" + typeof Recharts +
        "</p></div>";
    });
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Source Sans 3", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #F5F5F5;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-thumb { background: #B0B0B0; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #888; }
    ::-webkit-scrollbar-track { background: #E8E8E8; }
    button { font-family: inherit; }
    select { font-family: inherit; }
    table { font-family: inherit; }

    @media print {
      body {
        background: white !important;
      }
      button {
        display: none !important;
      }
      #root {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useMemo } = React;
    const {
      BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip,
      PieChart, Pie, Cell, ResponsiveContainer, Legend
    } = Recharts;

    const SRG_RED = "#E30613";
    const SRG_DARK = "#1A1A1A";
    const SRG_GREY = "#595959";
    const SRG_LIGHT = "#F5F5F5";
    const SRG_BORDER = "#E5E5E5";
    const RH = "#DC2626";
    const RM = "#F59E0B";
    const RL = "#16A34A";

    const CONTINGENCY = {
      total: 0,
      byGroup: {
        "Supervisor - Mechanical": 0,
        "Boilermaker": 0,
        "Coded Welder": 0,
        "Mechanical Fitter": 0,
        "Rigger - Advanced": 0,
        "Rigger - Intermediate": 0,
        "Trade Assistant": 0
      }
    };

    // Planned demand per Rapid Crews planner (Job #1353, Tronox May Major, 18–22 May 2026):
    //   Supervisor - Mechanical  4 day / 0 night
    //   Boilermaker              5 day / 5 night
    //   Coded Welder            10 day / 0 night
    //   Mechanical Fitter       20 day / 20 night
    //   Rigger - Advanced        5 day / 5 night
    //   Rigger - Intermediate    5 day / 5 night
    //   Trade Assistant         10 day / 10 night
    //                          --------------------
    //                           59 day / 45 night = 104 planned positions.
    //   + 1 extra Night Coded Welder (confirmed beyond original demand) = 105 total.
    // 48 named personnel confirmed (roster update 19/04/2026); 57 TBC.
    const tbc = (n, role, shift) => Array.from({ length: n }, () => ["TBC", role, shift]);
    const CREW = [
      // Supervisor - Mechanical — 4 day (3 confirmed, 1 TBC)
      // RILEY (Superintendent) and SMITH (Site Coordinator) mapped here.
      ["BURNS, Peter",                 "Supervisor - Mechanical", "Day"],
      ["RILEY, Adam",                  "Supervisor - Mechanical", "Day"],
      ["SMITH, Anthony",               "Supervisor - Mechanical", "Day"],
      ...tbc(1,                        "Supervisor - Mechanical", "Day"),

      // Boilermaker — 5 day (1 / 4) · 5 night (1 / 4)
      ["MENDY, Mathias",               "Boilermaker",             "Day"],
      ...tbc(4,                        "Boilermaker",             "Day"),
      ["TIAMSON, Melvin",              "Boilermaker",             "Night"],
      ...tbc(4,                        "Boilermaker",             "Night"),

      // Coded Welder — 10 day (0 / 10) · 1 night (1 extra beyond demand)
      ...tbc(10,                       "Coded Welder",            "Day"),
      ["RISCHIA, Mirko",               "Coded Welder",            "Night"],

      // Mechanical Fitter — 20 day (10 / 10) · 20 night (6 / 14)
      ["ABHINAV, Abhinav",             "Mechanical Fitter",       "Day"],
      ["DOBBELAERE, Mitya",            "Mechanical Fitter",       "Day"],
      ["DORUGADE, Omkar Uttam",        "Mechanical Fitter",       "Day"],
      ["FORREST, Wayne",               "Mechanical Fitter",       "Day"],
      ["GARDINER, Edward",             "Mechanical Fitter",       "Day"],
      ["GRAINGER-ROUSSEAU, Malcolm",   "Mechanical Fitter",       "Day"],
      ["HANCOCK, John",                "Mechanical Fitter",       "Day"],
      ["JAMES, Darren",                "Mechanical Fitter",       "Day"],
      ["MOHAMED, Abdikadir",           "Mechanical Fitter",       "Day"],
      ["THANGARASU, Prabhakaran",      "Mechanical Fitter",       "Day"],
      ...tbc(10,                       "Mechanical Fitter",       "Day"),
      ["ANADIF, Omar",                 "Mechanical Fitter",       "Night"],
      ["GANGEMI, Jake",                "Mechanical Fitter",       "Night"],
      ["MUKUNGA, Herbert",             "Mechanical Fitter",       "Night"],
      ["SINGH, Gurshwinder",           "Mechanical Fitter",       "Night"],
      ["USORE, Ngoni",                 "Mechanical Fitter",       "Night"],
      ["WANGLER, Graham",              "Mechanical Fitter",       "Night"],
      ...tbc(14,                       "Mechanical Fitter",       "Night"),

      // Rigger - Advanced — 5 day (2 / 3) · 5 night (2 / 3)
      ["CHITTY, Russell",              "Rigger - Advanced",       "Day"],
      ["DACK, Joe",                    "Rigger - Advanced",       "Day"],
      ...tbc(3,                        "Rigger - Advanced",       "Day"),
      ["FERNANDES, Luis",              "Rigger - Advanced",       "Night"],
      ["RATAHI, Hemi",                 "Rigger - Advanced",       "Night"],
      ...tbc(3,                        "Rigger - Advanced",       "Night"),

      // Rigger - Intermediate — 5 day (1 / 4) · 5 night (2 / 3)
      ["SILLIS, Daniel",               "Rigger - Intermediate",   "Day"],
      ...tbc(4,                        "Rigger - Intermediate",   "Day"),
      ["SOSA, Lucrecia Celeste",       "Rigger - Intermediate",   "Night"],
      ["VAN DER ZANDEN, Julian",       "Rigger - Intermediate",   "Night"],
      ...tbc(3,                        "Rigger - Intermediate",   "Night"),

      // Trade Assistant — 10 day (9 / 1) · 10 night (10 / 0)
      ["GILCHRIST, Sharon",            "Trade Assistant",         "Day"],
      ["HERNANDEZ, Jaime",             "Trade Assistant",         "Day"],
      ["JEFFERY, Jacinta",             "Trade Assistant",         "Day"],
      ["KARIKIS, Stefanos",            "Trade Assistant",         "Day"],
      ["LYON, Barry",                  "Trade Assistant",         "Day"],
      ["MENDIVIL, Jeremias",           "Trade Assistant",         "Day"],
      ["MONNET, Lise",                 "Trade Assistant",         "Day"],
      ["NDENGA, Naomi",                "Trade Assistant",         "Day"],
      ["TRAORE, Eleonora",             "Trade Assistant",         "Day"],
      ...tbc(1,                        "Trade Assistant",         "Day"),
      ["BENDANI, Mehdi",               "Trade Assistant",         "Night"],
      ["DILENA, Jessica",              "Trade Assistant",         "Night"],
      ["GARCIA, King",                 "Trade Assistant",         "Night"],
      ["MONDESIR, Lea",                "Trade Assistant",         "Night"],
      ["NGUYEN, Gabriel",              "Trade Assistant",         "Night"],
      ["RAFFAELE, Roberto",            "Trade Assistant",         "Night"],
      ["REID, Issac",                  "Trade Assistant",         "Night"],
      ["SARTI, Federico",              "Trade Assistant",         "Night"],
      ["THOMPSON, William",            "Trade Assistant",         "Night"],
      ["WITHERS, Beau",                "Trade Assistant",         "Night"]
    ];

    // Ticket overlay keyed by "SURNAME, FirstName". HRW licence codes map as:
    //   DG → dog, WP → ewp, LF → fork, RA/RI/RB → rig ("Advanced"/"Intermediate"/"Basic"),
    //   C0/C6/CN/SB/SI → recorded in extras only (no dedicated column).
    // Drivers licence: HR → hr, otherwise ignored.
    /* newhire / extras / drivers now arrive pre-merged on each roster
       entry via data/enrichment/tronox.json in the feed. No inline copy. */

    let E = [];      // populated by buildFromJson() — merges CREW layout + TICKETS notes + fetched roster + SQL tickets

    let DATES = [];   // derived from feed shutdown start/end
    let DOW = [];     // derived from feed shutdown start/end

    let ROSTER = [];  // populated by buildFromJson() from the merged crew

    const TC = [
      { key: "cse", label: "CSE" },
      { key: "wah", label: "WAH" },
      { key: "ewp", label: "EWP" },
      { key: "ba", label: "BA" },
      { key: "fork", label: "Fork" },
      { key: "hr", label: "HR" },
      { key: "dog", label: "Dog" },
      { key: "rig", label: "Rig" },
      { key: "gta", label: "GTA" },
      { key: "fa", label: "FA" }
    ];

    const GROUP_ORDER = ["Supervisor - Mechanical","Boilermaker","Coded Welder","Mechanical Fitter","Rigger - Advanced","Rigger - Intermediate","Trade Assistant"];
    
    function App() {
      const [tab, setTab] = useState("profile");
      const [fG, sfG] = useState("All");
      const [fS, sfS] = useState("All");
      const [fT, sfT] = useState([]);
      const [rShift, setRShift] = useState("All");
      const [rRole, setRRole] = useState("All");

      const toggle = k => sfT(p => p.includes(k) ? p.filter(x => x !== k) : [...p, k]);

      const filtered = useMemo(() => E.filter(e => {
        if (fG !== "All" && e.group !== fG) return false;
        if (fS !== "All" && e.shift !== fS) return false;
        if (fT.length > 0) {
          for (const t of fT) {
            if (t === "rig") {
              if (!e.rig) return false;
            } else {
              if (!e[t]) return false;
            }
          }
        }
        return true;
      }), [fG, fS, fT]);

      const groups = [...new Set(E.map(e => e.group))];
      const tN = E.filter(e => !e.name.startsWith("TBC")).length;
      const tT = E.filter(e => e.name.startsWith("TBC")).length;
      const aT = (E.filter(e => e.ty > 0).reduce((s, e) => s + e.ty, 0) / (E.filter(e => e.ty > 0).length || 1)).toFixed(1);
      const aS = (E.filter(e => e.sy > 0).reduce((s, e) => s + e.sy, 0) / (E.filter(e => e.sy > 0).length || 1)).toFixed(1);

      const tc = {};
      TC.forEach(t => {
        tc[t.label] = E.filter(e => t.key === "rig" ? !!e[t.key] : e[t.key]).length;
      });

      const rgd = GROUP_ORDER.filter(g => E.some(e => e.group === g) || (CONTINGENCY.byGroup[g] || 0) > 0).map(g => ({
        name: g,
        filled: E.filter(e => e.group === g && !e.name.startsWith("TBC")).length,
        tbc: E.filter(e => e.group === g && e.name.startsWith("TBC")).length,
        contingency: CONTINGENCY.byGroup[g] || 0
      }));

      const sd = [
        { name: "Day Shift", value: E.filter(e => e.shift === "Day").length },
        { name: "Night Shift", value: E.filter(e => e.shift === "Night").length }
      ];

      const tradeSummary = useMemo(() => {
        return GROUP_ORDER.filter(g => E.some(e => e.group === g) || (CONTINGENCY.byGroup[g] || 0) > 0).map(g => {
          const planned = E.filter(e => e.group === g).length;
          const confirmed = E.filter(e => e.group === g && !e.name.startsWith("TBC")).length;
          const gap = E.filter(e => e.group === g && e.name.startsWith("TBC")).length;
          const contingency = CONTINGENCY.byGroup[g] || 0;

          let readiness = "Covered";
          let readinessColor = RM;

          if (gap > 0) {
            readiness = "Gap";
            readinessColor = RH;
          } else if (contingency > 0) {
            readiness = "Ready";
            readinessColor = RL;
          }

          return { group: g, planned, confirmed, gap, contingency, readiness, readinessColor };
        });
      }, []);

      const risks = useMemo(() => {
        const r = [];
        groups.forEach(g => {
          ["Day", "Night"].forEach(s => {
            const crew = E.filter(e => e.group === g && e.shift === s);
            if (!crew.length) return;

            const named = crew.filter(e => !e.name.startsWith("TBC"));
            const tbc = crew.filter(e => e.name.startsWith("TBC"));

            if (tbc.length) {
              r.push({ group: g, shift: s, level: "HIGH", issue: `${tbc.length} unfilled position(s)`, action: "Source and confirm personnel before shutdown mobilisation." });
            }

            named.forEach(e => {
              if (e.sy < 1 && e.ty > 0) {
                r.push({ group: g, shift: s, level: "MED", issue: `${e.name} — limited shutdown experience`, action: "Pair with experienced worker for initial shifts. Do not assign to isolated or critical path tasks without direct oversight." });
              }
            });

            if (["Mechanical Fitter", "Trade Assistant", "Boilermaker"].includes(g) && !named.some(e => e.tele) && named.length > 0) {
              r.push({ group: g, shift: s, level: "LOW", issue: "No telehandler ticket holder in group", action: "Confirm telehandler access from adjacent crew or source ticket holder." });
            }

            if (!named.some(e => e.gta) && named.length > 2 && ["Mechanical Fitter", "Boilermaker", "Coded Welder"].includes(g)) {
              r.push({ group: g, shift: s, level: "LOW", issue: "No gas testing ticket holder in group", action: "Confirm GTA coverage from HSE or adjacent crew for confined space/hot work entries." });
            }

            named.forEach(e => {
              if (/resume.*(to be provided|pending)/i.test(e.sum)) {
                r.push({ group: g, shift: s, level: "MED", issue: `${e.name} — resume not yet received`, action: "Obtain and review resume before mobilisation to verify competency." });
              }
            });
          });
        });

        return r.sort((a, b) => ({ HIGH: 0, MED: 1, LOW: 2 })[a.level] - ({ HIGH: 0, MED: 1, LOW: 2 })[b.level]);
      }, []);

      const criticalRoles = useMemo(() => {
        const wanted = [
          "Supervisor - Mechanical"
        ];

        return wanted.map(role => {
          const matching = E.filter(e => e.role === role);
          return {
            role,
            planned: matching.length,
            confirmed: matching.filter(e => !e.name.startsWith("TBC")).length,
            gap: matching.filter(e => e.name.startsWith("TBC")).length
          };
        }).filter(x => x.planned > 0);
      }, []);

      const printRisks = useMemo(() => risks.slice(0, 8), [risks]);

      const ranked = useMemo(() => {
        const r = {};
        groups.forEach(g => {
          r[g] = E.filter(e => e.group === g && !e.name.startsWith("TBC"))
            .sort((a, b) => (b.ty + b.sy * 2) - (a.ty + a.sy * 2));
        });
        return r;
      }, []);

      const rosterRoles = [...new Set(ROSTER.map(r => r.role))].sort();

      const filteredRoster = useMemo(() => {
        return ROSTER.filter(r => {
          if (rShift === "Day" && !r.codes.includes("DS")) return false;
          if (rShift === "Night" && !r.codes.includes("NS")) return false;
          if (rRole !== "All" && r.role !== rRole) return false;
          return true;
        });
      }, [rShift, rRole]);

      const SC = ({ label, value, sub }) =>
        React.createElement("div", {
          style: {
            background: "white",
            borderLeft: `3px solid ${SRG_RED}`,
            padding: "18px 22px",
            boxShadow: "0 1px 2px rgba(0,0,0,0.04)"
          }
        },
          React.createElement("div", { style: { fontSize: 30, fontWeight: 800, color: SRG_DARK, lineHeight: 1.1 } }, value),
          React.createElement("div", { style: { fontSize: 12, fontWeight: 600, color: SRG_GREY, marginTop: 4, textTransform: "uppercase", letterSpacing: 0.5 } }, label),
          sub && React.createElement("div", { style: { fontSize: 11, color: "#8C8C8C", marginTop: 3 } }, sub)
        );

      const RB = ({ level }) =>
        React.createElement("span", {
          style: {
            display: "inline-block",
            padding: "3px 10px",
            fontSize: 10,
            fontWeight: 700,
            color: "white",
            background: level === "HIGH" ? RH : level === "MED" ? RM : RL,
            letterSpacing: 0.5
          }
        }, level);

      const ReadinessPill = ({ text, color }) =>
        React.createElement("span", {
          style: {
            display: "inline-block",
            padding: "3px 10px",
            fontSize: 10,
            fontWeight: 700,
            color: "white",
            background: color,
            letterSpacing: 0.4,
            textTransform: "uppercase"
          }
        }, text);

      const TabBtn = ({ id, label }) =>
        React.createElement("button", {
          onClick: () => setTab(id),
          style: {
            padding: "12px 24px",
            border: "none",
            borderBottom: tab === id ? `3px solid ${SRG_RED}` : "3px solid transparent",
            background: "transparent",
            cursor: "pointer",
            fontWeight: tab === id ? 700 : 600,
            fontSize: 13,
            color: tab === id ? SRG_DARK : SRG_GREY,
            textTransform: "uppercase",
            letterSpacing: 0.8,
            transition: "all .15s"
          }
        }, label);

      return React.createElement("div", {
        style: {
          fontFamily: "'Source Sans 3','Segoe UI',system-ui,sans-serif",
          background: SRG_LIGHT,
          minHeight: "100vh",
          color: SRG_DARK
        }
      },
        React.createElement("div", {
          style: {
            background: "white",
            borderBottom: `1px solid ${SRG_BORDER}`,
            boxShadow: "0 1px 3px rgba(0,0,0,0.04)"
          }
        },
          React.createElement("div", {
            style: {
              maxWidth: 1440,
              margin: "0 auto",
              padding: "20px 32px",
              display: "flex",
              alignItems: "center",
              gap: 24,
              flexWrap: "wrap"
            }
          },
            React.createElement("img", {
              src: "./srg_logo.png",
              alt: "SRG Global",
              style: { height: 44, width: "auto", flexShrink: 0 }
            }),
            React.createElement("div", { style: { width: 1, height: 40, background: SRG_BORDER, flexShrink: 0 } }),
            React.createElement("div", { style: { flex: 1, minWidth: 280 } },
              React.createElement("div", {
                style: {
                  fontSize: 10,
                  fontWeight: 700,
                  color: SRG_RED,
                  letterSpacing: 1.5,
                  textTransform: "uppercase"
                }
              }, "Asset Maintenance · Integrated Services"),
              React.createElement("div", {
                style: { fontSize: 22, fontWeight: 800, color: SRG_DARK, marginTop: 2, lineHeight: 1.2 }
              }, "Tronox — Major Shutdown Workforce Dashboard"),
              React.createElement("div", {
                style: { fontSize: 12, color: SRG_GREY, marginTop: 2 }
              }, `Tronox May Major Shutdown · 18–22 May 2026 · ${E.length} Positions`)
            )
          ),
          React.createElement("div", {
            style: {
              maxWidth: 1440,
              margin: "0 auto",
              padding: "0 32px",
              display: "flex",
              gap: 4,
              borderTop: `1px solid ${SRG_BORDER}`
            }
          },
            React.createElement(TabBtn, { id: "profile", label: "Workforce Profile" }),
            React.createElement(TabBtn, { id: "risk", label: "Risk Assessment" }),
            React.createElement(TabBtn, { id: "roster", label: "Shutdown Roster" }),
            React.createElement(TabBtn, { id: "print", label: "Print Summary" })
          )
        ),

        React.createElement("div", { style: { maxWidth: 1440, margin: "0 auto", padding: "24px 32px" } },

          tab === "profile" && React.createElement(React.Fragment, null,

            React.createElement("div", {
              style: { display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(180px,1fr))", gap: 16, marginBottom: 24 }
            },
              React.createElement(SC, { label: "Planned Workforce", value: E.length, sub: "Core planned positions" }),
              React.createElement(SC, { label: "Confirmed Workforce", value: tN, sub: "Named personnel only" }),
              React.createElement(SC, { label: "Open Positions", value: tT, sub: "Still to be confirmed" }),
              React.createElement(SC, { label: "Contingency Depth", value: CONTINGENCY.total, sub: "Separate backup workforce" }),
              React.createElement(SC, { label: "Avg Trade Experience", value: `${aT} yrs`, sub: "Named personnel only" }),
              React.createElement(SC, { label: "Avg Shutdown Experience", value: `${aS} yrs`, sub: "Named personnel only" })
            ),

            React.createElement("div", {
              style: { marginTop: -8, marginBottom: 24, fontSize: 11, color: SRG_GREY, fontStyle: "italic" }
            }, "Tronox May Major Shutdown — 5-day mechanical shut, 18–22 May 2026 (Mon–Fri). Planned 104 positions (59 day / 45 night) + 1 extra Night CW; 48 confirmed, 57 TBC. Requirements: CSE for Fitters / TAs / Riggers, WAH for all trades, 50% BA for Fitters / TAs, 50% Rigging for Fitters. Job #1353, South West — Scheduling Owner: Rogerson, Kirsten."),

            React.createElement("div", {
              style: { background: "white", boxShadow: "0 1px 2px rgba(0,0,0,0.04)", border: `1px solid ${SRG_BORDER}`, overflow: "auto", marginBottom: 24 }
            },
              React.createElement("div", {
                style: { padding: "18px 24px", borderBottom: `2px solid ${SRG_RED}`, fontWeight: 700, fontSize: 12, textTransform: "uppercase", letterSpacing: 1, color: SRG_DARK }
              }, "By-Trade Workforce Summary"),
              React.createElement("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: 12 } },
                React.createElement("thead", null,
                  React.createElement("tr", { style: { background: "#FAFAFA", borderBottom: `1px solid ${SRG_BORDER}` } },
                    React.createElement("th", { style: { padding: "12px", textAlign: "left", fontWeight: 700, textTransform: "uppercase", fontSize: 10, color: SRG_GREY, letterSpacing: 0.5 } }, "Trade Group"),
                    React.createElement("th", { style: { padding: "12px 8px", textAlign: "center", fontWeight: 700, textTransform: "uppercase", fontSize: 10, color: SRG_GREY, letterSpacing: 0.5 } }, "Planned"),
                    React.createElement("th", { style: { padding: "12px 8px", textAlign: "center", fontWeight: 700, textTransform: "uppercase", fontSize: 10, color: SRG_GREY, letterSpacing: 0.5 } }, "Confirmed"),
                    React.createElement("th", { style: { padding: "12px 8px", textAlign: "center", fontWeight: 700, textTransform: "uppercase", fontSize: 10, color: SRG_GREY, letterSpacing: 0.5 } }, "Gap"),
                    React.createElement("th", { style: { padding: "12px 8px", textAlign: "center", fontWeight: 700, textTransform: "uppercase", fontSize: 10, color: SRG_GREY, letterSpacing: 0.5 } }, "Contingency"),
                    React.createElement("th", { style: { padding: "12px", textAlign: "left", fontWeight: 700, textTransform: "uppercase", fontSize: 10, color: SRG_GREY, letterSpacing: 0.5 } }, "Readiness")
                  )
                ),
                React.createElement("tbody", null,
                  tradeSummary.map((r, i) =>

    /* -------------------------------------------------------------------
       Data feed integration — fetches the live roster from southwest-
       shutdowns on load. The consolidated feed is the single source of
       truth for everything:
         - role / shift / days      : from the scheduler (Rapid Crews)
         - ticket booleans          : from the SQL compliance sheet
         - newhire / extras /
           drivers                  : from data/enrichment/tronox.json
                                       merged in by parse_rapidcrews.py
       The inline CREW array below remains only as a planned shift-split
       hint for distributing TBC rows (some roles plan e.g. 4 Day + 4 Night
       unfilled slots; preserve that shape rather than dumping all TBC
       to Day).
       ------------------------------------------------------------------- */

    const DATA_URL = "https://raw.githubusercontent.com/N01dea5/southwest-shutdowns/main/data/tronox.json";

    // Pin this dashboard to the May 2026 Major shutdown so historical or
    // future Tronox jobs in the feed don't hijack it.
    const SHUTDOWN_ID = "tronox-2026-05";

    function buildFromJson(data) {
      const shutdowns = data.shutdowns || [];
      let sd = shutdowns.find(s => s.id === SHUTDOWN_ID)
            || shutdowns.find(s => s.status === "in_progress")
            || shutdowns[0];
      if (!sd) throw new Error("No shutdowns in data feed");
      const required  = sd.required_by_role || {};
      const rosterRaw = sd.roster || [];

      DATES = [];
      DOW   = [];
      const start = new Date(sd.start_date + "T00:00:00");
      const end   = new Date(sd.end_date   + "T00:00:00");
      const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const dowNames   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        DATES.push(String(d.getDate()).padStart(2, "0") + " " + monthNames[d.getMonth()]);
        DOW.push(dowNames[d.getDay()]);
      }

      const ticketKeys = ["cse","wah","ewp","ba","fork","hr","dog","gta","fa"];
      const merged = [];

      for (const r of rosterRaw) {
        const t      = r.tickets || {};
        const shift  = r.shift || "Day";
        const tCount = ticketKeys.filter(k => !!t[k]).length + (t.rig ? 1 : 0);
        const hasExp = ticketKeys.some(k => t[k] && t[k].status === "expiring_soon")
                    || (t.rig && t.rig.status === "expiring_soon");
        // newhire / extras / drivers arrive pre-merged from the enrichment feed.
        const hasAnyTicket = tCount > 0 || r.drivers === "HR";
        const bits = [];
        if (r.newhire) bits.push("new hire (first SRG mobilisation)");
        if (r.extras)  bits.push("also holds " + r.extras);
        const detail = bits.length ? " " + bits.join(" · ") + "." : "";
        const base = hasAnyTicket
          ? `${shift} shift ${(r.role || "position").toLowerCase()} — ${tCount} current ticket${tCount === 1 ? "" : "s"} in Rapid Crews compliance.${hasExp ? " Ticket(s) expiring within 30 days — review before mobilisation." : ""}`
          : `${shift} shift ${(r.role || "position").toLowerCase()} — ticket details awaiting compliance entry.`;
        merged.push({
          id: merged.length + 1,
          name: r.name,
          role: r.role,
          shift: shift,
          days: DATES.length || 5,
          group: r.role,       // Tronox groups by role directly (GROUP_ORDER uses role names)
          ty: 0, sy: 0,        // not tracked on Tronox
          cse:  !!t.cse,
          wah:  !!t.wah,
          ewp:  !!t.ewp,
          ba:   !!t.ba,
          fork: !!t.fork,
          hr:   !!t.hr,
          dog:  !!t.dog,
          rig:  (t.rig && t.rig.level) || "",
          gta:  !!t.gta,
          fa:   !!t.fa,
          tele: !!t.fork,
          newhire: !!r.newhire,
          drivers: r.drivers || "",
          extras:  r.extras  || "",
          mobile:  r.mobile  || "",
          personnel_id: r.personnel_id || null,
          _tickets: t,
          _ticketCount: tCount,
          _enriched:    !!(r.newhire || r.extras || r.drivers),
          _expiringSoon: hasExp,
          sum: base + detail,
        });
      }

      // ---- TBC + "Confirmed (name pending)" padding -------------------
      // Three buckets for each role:
      //   named in roster  -> existing merged entries above
      //   filled - named   -> "Confirmed (name pending)": SQL says it's
      //                        filled but the RosterCut export doesn't
      //                        carry a name yet (scheduler lag). Shown so
      //                        the per-site count matches the consolidated
      //                        dashboard's source-of-truth filled figures.
      //   required - filled-> TBC: positions genuinely unfilled.
      const filled_by_role = sd.filled_by_role || {};
      const crewTbcByRoleShift = {};
      for (const [name, role, shift] of CREW) {
        if (name !== "TBC") continue;
        const k = role + "|" + shift;
        crewTbcByRoleShift[k] = (crewTbcByRoleShift[k] || 0) + 1;
      }
      function distribute(role, n, kind) {
        // Day/night split: honour inline CREW planning when available, else
        // biased toward Day.
        const planDay   = crewTbcByRoleShift[role + "|Day"]   || 0;
        const planNight = crewTbcByRoleShift[role + "|Night"] || 0;
        const planTotal = planDay + planNight;
        let addDay = 0, addNight = 0;
        if (planTotal > 0) {
          addDay   = Math.round(n * (planDay / planTotal));
          addNight = n - addDay;
        } else {
          addDay = n;
        }
        for (let i = 0; i < addDay + addNight; i++) {
          const shift = i < addDay ? "Day" : "Night";
          const isPending = kind === "pending";
          merged.push({
            id: merged.length + 1,
            name: isPending ? "Confirmed (name pending)" : "TBC",
            role, shift,
            days: DATES.length || 5,
            group: role,
            ty: 0, sy: 0,
            cse:false, wah:false, ewp:false, ba:false, fork:false, hr:false,
            dog:false, rig:"", gta:false, fa:false, tele:false,
            newhire:false, drivers:"", extras:"",
            mobile: "", personnel_id: null,
            _tickets: {}, _ticketCount: 0, _overlay: {}, _expiringSoon: false,
            _pending: isPending,
            sum: isPending
              ? `${role} confirmed by Rapid Crews planner; name not yet in RosterCut export. Awaiting scheduler update.`
              : `Unfilled ${role} — ${shift} shift. Source personnel and confirm ticket compliance before mobilisation.`,
          });
        }
      }
      const rolesToPad = new Set(Object.keys(required).concat(Object.keys(filled_by_role)));
      for (const role of rolesToPad) {
        const req    = required[role] || 0;
        const filled = filled_by_role[role] || 0;
        const named  = rosterRaw.filter(x => x.role === role).length;
        const pending = Math.max(0, filled - named);
        const tbc     = Math.max(0, req - Math.max(filled, named));
        if (pending > 0) distribute(role, pending, "pending");
        if (tbc     > 0) distribute(role, tbc,     "tbc");
      }

      // Sort: by role order from GROUP_ORDER, then Day first, then named first, alpha.
      const roleRank = {};
      GROUP_ORDER.forEach((g, i) => { roleRank[g] = i; });
      merged.sort((a, b) => {
        const ra = roleRank[a.role] ?? 99;
        const rb = roleRank[b.role] ?? 99;
        if (ra !== rb) return ra - rb;
        if (a.shift !== b.shift) return a.shift === "Day" ? -1 : 1;
        const aT = a.name === "TBC";
        const bT = b.name === "TBC";
        if (aT !== bT) return aT ? 1 : -1;
        return a.name.localeCompare(b.name);
      });
      merged.forEach((e, i) => { e.id = i + 1; });

      E = merged;
      ROSTER = E.filter(e => e.name !== "TBC").map(e => ({
        name: e.name, role: e.role,
        notes: `${e.shift} shift · ${DATES.length} days`,
        codes: (e.shift === "Night"
                 ? new Array(DATES.length).fill("NS")
                 : new Array(DATES.length).fill("DS")),
      }));

      const em = sd._source && sd._source.enrichment_match;
      window.__TRONOX_META__ = {
        name: sd.name, site: sd.site,
        start_date: sd.start_date, end_date: sd.end_date,
        generated_at: data.generated_at || null,
        enrichment_match: em || null,
      };

      if (console && console.info) {
        const enriched = E.filter(e => e._enriched).length;
        const named    = E.filter(e => e.name !== "TBC" && !e._pending).length;
        console.info("[tronox] roster=%d (named=%d pending=%d tbc=%d), enriched=%d/%d, tickets=%d, expiring soon=%d",
          E.length, named,
          E.filter(e => e._pending).length,
          E.filter(e => e.name === "TBC").length,
          enriched, named,
          E.reduce((s, e) => s + (e._ticketCount || 0), 0),
          E.filter(e => e._expiringSoon).length);
      }
    }

    function renderStatus(kind, message, detail) {
      const root = document.getElementById("root");
      const color  = kind === "error" ? "#900" : SRG_GREY;
      const border = kind === "error" ? "#C00" : SRG_BORDER;
      const bg     = kind === "error" ? "#FEF2F2" : "white";
      root.innerHTML =
        '<div style="max-width:520px;margin:80px auto;padding:32px;font-family:Source Sans 3,Segoe UI,system-ui,sans-serif;' +
           'background:' + bg + ';border:1px solid ' + border + ';color:' + color + ';box-shadow:0 1px 3px rgba(0,0,0,.05);">' +
          '<div style="font-size:11px;font-weight:700;color:' + SRG_RED + ';letter-spacing:1.5px;text-transform:uppercase;">Tronox Major Shutdown Dashboard</div>' +
          '<div style="font-size:18px;font-weight:700;margin-top:8px;color:' + SRG_DARK + ';">' + message + '</div>' +
          (detail ? '<div style="font-size:12px;color:#888;margin-top:10px;font-family:monospace;">' + detail + '</div>' : '') +
          (kind === "error" ? '<div style="font-size:12px;color:#666;margin-top:16px;">Try reloading. If the problem persists, the data feed (southwest-shutdowns) may be offline — contact Asset Services.</div>' : '') +
        '</div>';
    }

    (async function boot() {
      renderStatus("loading", "Loading workforce data…");
      let data;
      try {
        const resp = await fetch(DATA_URL, { cache: "no-cache" });
        if (!resp.ok) throw new Error("HTTP " + resp.status + " from " + DATA_URL);
        data = await resp.json();
      } catch (err) {
        renderStatus("error", "Failed to load data feed", String(err && err.message || err));
        return;
      }
      try {
        buildFromJson(data);
      } catch (err) {
        renderStatus("error", "Data feed format error", String(err && err.message || err));
        return;
      }
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(App));
    })();
  </script>
